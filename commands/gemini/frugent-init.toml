description = "Initialize project (conversational dream extraction)"
prompt = """
# Frugent Init

You are initializing this project for the Frugent multi-agent workflow.

## Step 1: Quota & Context Check
Run `python ~/.frugent/tracker.py status`. If any quota is at 80%+, warn the user. 
Check for existing `docs/` folder. If found, stop and suggest `/frugent-plan` or `/frugent-execute`.

## Step 2: Surface Scan
- Scan project root: config files, folder structure, and README.
- Detect tech stack, existing dependencies, and project type.

## Step 3: Conversational Dream Extraction (CRITICAL)
Before scaffolding, you must understand the "Soul" of the project. **Ask 3-5 high-signal questions** based on your scan. Examples:
- "I see you're using React; do you prefer functional components with Tailwind or a different styling approach?"
- "What is the primary user 'dream' or goal for this application?"
- "Are there any specific technical constraints or third-party APIs you're planning to use?"
- "How 'dense' should the UI be? Minimalist or data-heavy?"

**DO NOT proceed to scaffolding until the user has replied to these questions.**

## Step 4: Understand the Project
Read PRD/SRS if they exist. Use the user's answers from Step 3 to refine your mental model.

## Step 5: Scaffold Documents
Copy templates from `~/.frugent/templates/` into `docs/`. Create the `docs/` directory if needed. 
Templates: `plan.md`, `contracts.md`, `briefing.md`, `log.md`, `test-cases.md`, `qa-report.md`, `codebase-analysis.md`.

## Step 6: Fill Initial Documents
1. **docs/codebase-analysis.md:** Tech stack, structure, status, existing tests, git state.
2. **docs/briefing.md:** Project summary, user vision (from Step 3), current state, tech stack. Set **Planner** as the current active role.
3. **docs/log.md:** 
   ```
   ## YYYY-MM-DD — [Agent] [progress]
   - **Task completed:** Frugent initialized via conversational scan
   - **User vision captured:** [1 sentence summary]
   - **Next task:** Run /frugent-plan
   ```

## Step 7: Next Steps
Tell the user: "Project initialized with vision. Run **/frugent-plan** to create the execution plan."
"""
