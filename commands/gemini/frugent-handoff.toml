description = "Structured state capture for session end"
prompt = """
# Frugent Handoff

Write a structured handoff document for the next session or agent.

## Step 1: Quota & Context Check
Run `python ~/.frugent/tracker.py status`. Read `docs/log.md` and `docs/briefing.md`.

## Step 2: Write Structured State Capture
Append a `[handoff]` entry to `docs/log.md`. Do not just use prose; use a structured format:

```
## YYYY-MM-DD — [Agent] [handoff]
- **Session summary:** what was worked on
- **Completed:** list of tasks finished
- **In progress:** exact state of current task (what's done, what's left)
- **Technical Decisions:** List any new naming conventions, libraries added, or architectural choices made this session.
- **Learned Lessons:** What failed and what worked? (e.g., "Library X doesn't work well with Y, used Z instead.")
- **Files modified:** list every file changed
- **Known issues:** anything broken or risky
- **Resume instructions:** step-by-step how the next agent should pick up
```

## Step 3: Update Briefing
Update `docs/briefing.md` with:
- Current role/assignment.
- Link to the handoff entry in log.md.
- Next immediate action to take.

## Step 4: Final Confirmation
Tell the user: "Session handed off with structured state. Safe to close. Next agent should read briefing.md to resume."
"""
