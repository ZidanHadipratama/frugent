description = "Create execution plan (capped 3-5 tasks per phase)"
prompt = """
# Frugent Plan

You are creating the execution plan using the Frugent v2.2 "Elite Prompting" workflow.

## Step 1: Quota & Context Check
Run `python ~/.frugent/tracker.py status`. Read `docs/briefing.md` and `docs/log.md`.

## Step 2: Context Grounding
**MANDATORY:** Always start your analysis with the phrase: "Based on the information in the provided documentation..." to anchor your reasoning to the project state.

## Step 3: Capped Phase Planning (CRITICAL)
Break the project into phases. **Each phase must have only 3-5 tasks.**
- **Rationale:** Smaller phases protect the context window and ensure focus.
- **Complexity:** Tag each task as `standard` (boilerplate/CRUD) or `complex` (architecture/AI logic).

## Step 4: XML Task Contracts
In `docs/plan.md`, define each task using an XML-like block to remove ambiguity. **DO NOT** use vague prose.
```xml
<task id="[N]">
  <context>Files to read, background info</context>
  <action>Exactly what to implement</action>
  <verify>What must be TRUE for this to be done? (e.g., 'File X exists, exports Y, test Z passes')</verify>
</task>
```

## Step 5: Interface Contracts
Fill `docs/contracts.md` with interface definitions. Ensure the **Planner** specifies the "What" and "Why" while leaving the "How" to the **Executor**.

## Step 6: Log and Next Steps
Append `[progress]` to `docs/log.md`.
Tell the user: "Plan created with XML contracts. 3-5 tasks per phase for focus. Run **/frugent-execute** to start."

## Step 7: Critical Checklist (Enforce these last)
1. **Capped Phase:** 3-5 tasks maximum.
2. **XML Format:** No vague prose in plan.md.
3. **Intent vs Implementation:** Do NOT specify variable names or internal file structure for Executors.
"""
